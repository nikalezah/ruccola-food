<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сервис правильного питания">
    <title>Interna Food</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #root { width: 100%; height: 100%; }
        #loading { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .spinner-icon { width: 56px; height: 56px; animation: pulse 1.8s ease-in-out infinite; transform-origin: center; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }
    </style>
</head>
<body>
    <div id="root"><div id="loading"><img class="spinner-icon" src="icon.svg" alt="Loading"></div></div>
    <script src="customer.js"></script>
</body>
</html>
